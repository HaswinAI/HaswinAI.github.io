      .loading-spinner {
        width: 40px;

        border: 4px solid rgba(59, 130, 246, 0.2);
        border-top: 4px solid #3b82f6;
        border-radius: 50%;

      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loading-container {

  <body>
    <div id="root">
      <div class="loading-container">
        <div class="loading-spinner"></div>
        <p>Loading Portfolio...</p>
      </div>
    </div>
    <script>
      // Global error handler to catch and log any JavaScript errors
      window.addEventListener('error', function(e) {
        console.error('Global error:', e.error);
        document.body.style.backgroundColor = '#ff0000'; // Red background to indicate error
        document.querySelector('.loading-container').innerHTML = '<div style="color:white;text-align:center"><h2>Error Loading Application</h2><p>' + e.message + '</p><p>Check console for details</p></div>';
      });
      
      window.addEventListener('unhandledrejection', function(e) {
        console.error('Unhandled promise rejection:', e.reason);
        document.body.style.backgroundColor = '#ff6600'; // Orange background for promise errors
        document.querySelector('.loading-container').innerHTML = '<div style="color:white;text-align:center"><h2>Application Error</h2><p>Unhandled Promise Rejection</p><p>Check console for details</p></div>';
      });
    </script>
  </body>
